<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f13">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Timer">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Custom Timer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="app-title">
                <span class="title-icon">◉</span>
                <h1>Timer</h1>
            </div>
        </header>

        <div class="timer-display">
            <div class="timer-state" id="timerState">Ready</div>
            <div class="elapsed-label">elapsed</div>
            <div class="elapsed-time" id="elapsedTime">00:00</div>
        </div>

        <div class="settings">
            <div class="stepper-group">
                <div class="stepper-info">
                    <span class="stepper-label">Beep Interval</span>
                    <span class="stepper-unit">seconds</span>
                </div>
                <div class="stepper-controls">
                    <button class="stepper-btn" data-target="interval" data-delta="-1">−</button>
                    <input type="number" id="interval" min="1" max="300" value="1">
                    <button class="stepper-btn" data-target="interval" data-delta="1">+</button>
                </div>
            </div>

            <div class="stepper-group">
                <div class="stepper-info">
                    <span class="stepper-label">Beeps Per Long</span>
                    <span class="stepper-unit">count</span>
                </div>
                <div class="stepper-controls">
                    <button class="stepper-btn" data-target="beepCount" data-delta="-1">−</button>
                    <input type="number" id="beepCount" min="1" max="20" value="10">
                    <button class="stepper-btn" data-target="beepCount" data-delta="1">+</button>
                </div>
            </div>

            <div class="stepper-group">
                <div class="stepper-info">
                    <span class="stepper-label">Countdown</span>
                    <span class="stepper-unit">sec · 0 = off</span>
                </div>
                <div class="stepper-controls">
                    <button class="stepper-btn" data-target="countdown" data-delta="-1">−</button>
                    <input type="number" id="countdown" min="0" max="300" value="0">
                    <button class="stepper-btn" data-target="countdown" data-delta="1">+</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-start">Start</button>
            <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
            <button id="resetBtn" class="btn btn-reset">Reset</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.warn('Service worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
